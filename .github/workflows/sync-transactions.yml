name: Sync Transactions

on:
  schedule:
    # 매일 KST 06:12 (UTC 21:12) 실행
    - cron: '12 21 * * *'
  workflow_dispatch: # 수동 실행 지원
  push:
    branches:
      - master
      - main

jobs:
  sync:
    name: 국토부 API → Firestore → Static Files
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Skip expensive jobs on push
        if: github.event_name == 'push'
        run: echo "Skipped data synchronization during standard push events. This job safely exists to satisfy branch protection rules without duplicate api calls."

      # Step 1: 국토부 API → Firestore
      - name: Fetch transactions from 국토부 API
        if: github.event_name != 'push'
        run: |
          if [ -z "${BUILDING_API_KEY}" ]; then
            echo "BUILDING_API_KEY is not set. Skipping api fetch."
            exit 0
          fi
          node scripts/fetch-transactions.js
        env:
          BUILDING_API_KEY: ${{ secrets.BUILDING_API_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      # Step 2: Firestore → Static files (transaction-summary.ts + tx-data/*.json)
      - name: Generate static transaction files
        if: github.event_name != 'push'
        run: node scripts/sync-transactions.js
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      # Step 3: Commit & Push if changes exist
      - name: Commit and push changes
        if: github.event_name != 'push'
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            TODAY=$(date +%Y-%m-%d)
            git commit -m "data: auto-sync transactions via github actions ($TODAY)"
            git push
            echo "🚀 Changes pushed — Vercel will auto-deploy"
          fi

      # Step 4: Notify on failure (Optional, requires SLACK_WEBHOOK_URL secret)
      - name: Send notification on failure
        if: failure()
        run: |
          if [ -n "${SLACK_WEBHOOK_URL}" ]; then
            curl -X POST -H 'Content-type: application/json' --data '{"text":"🚨 PORTFOLIO DVIEW: 자동 실거래가 동기화 워크플로우 실행 실패! GitHub Actions 로그를 확인하세요."}' ${SLACK_WEBHOOK_URL}
          else
            echo "SLACK_WEBHOOK_URL is not set. Skipping error notification."
          fi
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

