name: Sync Transactions

on:
  schedule:
    # 매일 KST 07:00 (UTC 22:00) 실행 (국토부 배치 작업 안전 마진 확보)
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동 실행 지원
  push:
    branches:
      - master
      - main

jobs:
  sync:
    name: 국토부 API → Firestore → Static Files
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Skip expensive jobs on push
        if: github.event_name == 'push'
        run: echo "Skipped data synchronization during standard push events. This job safely exists to satisfy branch protection rules without duplicate api calls."

      # Step 1: 국토부 API → Firestore
      - name: Fetch transactions from 국토부 API
        if: github.event_name != 'push'
        run: |
          if [ -z "${BUILDING_API_KEY}" ]; then
            echo "BUILDING_API_KEY is not set. Skipping api fetch."
            exit 0
          fi
          node scripts/fetch-transactions.js
        env:
          BUILDING_API_KEY: ${{ secrets.BUILDING_API_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      # Step 2: Firestore → Static files (transaction-summary.ts + tx-data/*.json)
      - name: Generate static transaction files
        if: github.event_name != 'push'
        run: node scripts/sync-transactions.js
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      # Step 3: Create Pull Request if changes exist
      - name: Create Pull Request
        if: github.event_name != 'push'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "data: auto-sync transactions via github actions"
          title: "data: auto-sync transactions"
          body: "Auto-synced transaction data from Molit API."
          branch: "data/sync-transactions"
          base: "master"
