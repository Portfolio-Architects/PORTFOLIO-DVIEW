name: Daily Molit Data Sync

on:
  schedule:
    # 21:00 UTC is 06:00 AM KST the next day.
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  sync-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Fetch Real Estate Data
        run: |
          python fetch_molit_data.py
          
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Auto-sync real estate data [skip ci]"
          title: "data: auto-sync real estate data"
          body: "Auto-synced real estate data from Molit API."
          branch: "data/sync-realestate"
          base: "master"
