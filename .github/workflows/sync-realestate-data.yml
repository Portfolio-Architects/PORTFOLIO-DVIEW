name: Daily Molit Data Sync

on:
  schedule:
    # 21:00 UTC is 06:00 AM KST the next day.
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  sync-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Fetch Real Estate Data
        run: |
          python fetch_molit_data.py
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/ dongtan_transactions_latest.csv || true
          
          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "Auto-sync real estate data [skip ci]"
            git push
          else
            echo "No changes in real estate data to commit."
          fi

